# Single-split smoke-test TOML for the local (no-SLURM) docker harness.
#
# Trimmed from the cosmos-reason2 cr3-8b assy17 sweep TOML to one split
# (ASSY17_v1.2_mcq) and rewritten to use the local /datasets mount that
# docker-interactive.sh creates inside the container:
#
#   host:      /localhome/<user>/datasets/assy17/...
#   container: /datasets/assy17/...
#
# The HF checkpoint lives under the repo and is therefore visible at
# /workspace/Nemotron/checkpoints/... inside the container via the repo mount.
#
# Pipeline (run inside docker-interactive.sh):
#   1. python /workspace/Nemotron/cr3/scripts/cr3_to_energon.py \
#          --cr3-toml /workspace/Nemotron/cr3/test/mcq_test.toml \
#          --output   /workspace/Nemotron/cr3/test/energon/mcq_smoke \
#          --val-fraction 0.1 \
#          --samples-per-shard 50
#   2. bash /workspace/Nemotron/cr3/test/scripts/run_import_ckpt.sh \
#          /workspace/Nemotron/checkpoints/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16 \
#          /workspace/Nemotron/checkpoints/megatron/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16
#   3. CR3_ENERGON_PATH=/workspace/Nemotron/cr3/test/energon/mcq_smoke \
#      CR3_CKPT_SAVE=/workspace/Nemotron/cr3/test/ckpt/mcq_smoke \
#      bash /workspace/Nemotron/cr3/test/scripts/run_train_smoke.sh

redis = "12800"

[train]
resume = true
epoch = 1
output_dir = "/workspace/Nemotron/cr3/test/output/mcq_smoke"
epsilon = 1e-6
optm_name = "AdamW"
optm_impl = ["fused", "fused", "fused"]
optm_weight_decay = 0.01
optm_betas = [0.9, 0.999]
optm_warmup_steps = 20
optm_lr = [1.5e-05, 1e-06, 1.5e-05]    # llm, vlm, linear
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 1
sync_weight_interval = 1

[validation]
enable = false
freq = 1000
batch_size = 1

[policy]
model_name_or_path = "/workspace/Nemotron/checkpoints/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16"
model_max_length = 81920
model_gradient_checkpointing = true

[logging]
logger = ["console"]
project_name = "cr3_nemotron_smoke"
experiment_name = "mcq_smoke"

[train.train_policy]
type = "sft"
mini_batch = 1
dataloader_num_workers = 2
dataloader_prefetch_factor = 2
conversation_column_name = "conversations"
dataloader_shuffle = true
enable_dataset_cache = false

[train.train_policy.dataset]
name = [
    "/datasets/assy17/antenna_v1.2_augmented_0/mcq/mcq.json",
]
subset = "NOUSED"
split = [
    "ASSY17_v1_2_mcq",
]
test_size = 0.1

[train.ckpt]
enable_checkpoint = true
save_freq = 200
max_keep = 1
save_mode = "async"

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 8
pp_size = 1
dp_replicate_size = 1
cp_rotate_method = "allgather"

[custom.vision]
fps = 8
max_frames = 40
total_pixels = 16572416   # 32 * 32 * 8092 * 2, 16k vision token

[custom]
system_prompt = "Answer the questions."
